<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elliott Equipment — Pricing Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Roboto+Slab:wght@800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --surface-0: #0a0a0b;
    --surface-1: #111214;
    --surface-2: #18191c;
    --surface-3: #1f2124;
    --surface-4: #26282c;
    --border-subtle: rgba(255,255,255,0.06);
    --border-medium: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary: #f0f0f2;
    --text-secondary: #a0a3ae;
    --text-tertiary: #5e616e;
    --text-inverse: #ffffff;
    --brand-red: #E8000D;
    --row-highlight: rgba(255,255,255,0.06);
    --row-highlight-strong: rgba(255,255,255,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--surface-0);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === TOP BAR === */
  .topbar {
    border-bottom: 1px solid var(--border-subtle);
    padding: 0 32px;
    height: 56px;
    flex: 0 0 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-1);
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .topbar .brand {
    font-family: 'Roboto Slab', serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--brand-red);
  }
  .topbar .divider {
    width: 1px;
    height: 20px;
    background: var(--border-medium);
  }
  .topbar .subtitle {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
  }
  .topbar-tabs {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 16px;
    border: 1px solid var(--border-medium);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .tab-btn:hover { color: var(--text-primary); border-color: var(--border-strong); }
  .tab-btn.active {
    background: var(--surface-3);
    color: var(--text-primary);
    border-color: var(--border-strong);
  }
  .topbar .count-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--surface-3);
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* === LAYOUT === */
  .layout {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 0;
    overflow: hidden;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
  }

  /* === SIDEBAR === */
  .sidebar {
    background: var(--surface-1);
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .search-wrap {
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-1);
    flex: 0 0 auto;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: var(--surface-0);
    border: 1px solid var(--border-medium);
    border-radius: 6px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: var(--text-tertiary); }
  .search-wrap input:focus {
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .item-list { flex: 1 1 auto; overflow-y: auto; min-height: 0; }

  .list-item {
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.12s;
    position: relative;
  }
  .list-item:hover { background: var(--surface-2); }
  .list-item.selected { background: var(--surface-2); }
  .list-item.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--text-primary);
  }
  .list-item .li-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .list-item .li-pn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.3px;
  }
  .list-item .li-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .list-item .li-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
    display: flex;
    gap: 12px;
  }
  .list-item .li-price {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .list-item .li-type-chip {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--surface-3);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
  }

  .group-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-tertiary);
    padding: 14px 16px 6px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
  }

  /* === FILTER PILLS === */
  .filter-wrap {
    padding: 8px 16px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border-subtle);
    flex: 0 0 auto;
  }
  .filter-pill {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border-medium);
    background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .filter-pill:hover {
    border-color: var(--text-secondary);
    color: var(--text-secondary);
  }
  .filter-pill.active {
    background: var(--surface-3);
    border-color: var(--border-strong);
    color: var(--text-primary);
  }

  /* === MAIN CONTENT === */
  .main {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    background: var(--surface-0);
  }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    gap: 12px;
  }
  .empty svg { opacity: 0.2; }
  .empty p { font-size: 14px; }

  .detail { display: none; flex-direction: column; min-height: 0; height: 100%; }
  .detail.visible {
    display: flex;
    animation: fadeUp 0.25s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === STICKY HEADER === */
  .sticky-block {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-0);
    border-bottom: 1px solid var(--border-subtle);
    padding: 24px 32px 18px;
    flex: 0 0 auto;
  }
  .sticky-top-row {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    margin-bottom: 18px;
  }
  .sticky-info { flex: 1 1 auto; min-width: 0; }
  .sticky-image {
    flex: 0 0 auto;
    max-width: 160px;
  }
  .sticky-image .thumb-link {
    display: block;
    border: 1px solid var(--border-medium);
    border-radius: 6px;
    background: var(--surface-2);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .sticky-image .thumb-link:hover { border-color: var(--border-strong); }
  .sticky-image canvas, .sticky-image img {
    display: block;
    max-width: 100%;
    max-height: 120px;
    object-fit: contain;
    margin: 0 auto;
  }
  .sticky-image .pdf-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    gap: 6px;
  }
  .sticky-image .pdf-label {
    font-size: 10px;
    color: var(--text-tertiary);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    word-break: break-all;
  }

  .dh-pn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    display: block;
    margin-bottom: 4px;
  }
  .dh-desc {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 6px;
  }
  .dh-crumbs {
    font-size: 12px;
    color: var(--text-tertiary);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .dh-crumbs .sep { color: var(--text-tertiary); opacity: 0.4; }
  .dh-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface-3);
    color: var(--text-secondary);
    border: 1px solid var(--border-medium);
    margin-left: 8px;
    vertical-align: middle;
  }

  /* === STAT BAR === */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 1000px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
  }
  .stat-block {
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-block .stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  .stat-block .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .stat-block .stat-value.muted {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .stat-block .stat-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  /* === SCROLLABLE CONTENT === */
  .scroll-area {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 24px 32px 48px;
    min-height: 0;
  }

  /* === MIDDLE GRID === */
  .mid-grid {
    display: grid;
    grid-template-columns: 2fr 3fr;
    gap: 16px;
    margin-bottom: 28px;
  }
  @media (max-width: 900px) {
    .mid-grid { grid-template-columns: 1fr; }
  }

  /* === SECTION === */
  .section { margin-bottom: 0; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-tertiary);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  /* === PRICING TABLE === */
  .ptable {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
  }
  .ptable thead th {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    text-align: left;
    padding: 10px 12px;
    background: var(--surface-3);
    border-bottom: 1px solid var(--border-medium);
  }
  .ptable thead th:not(:first-child) { text-align: right; }
  .ptable tbody td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .ptable tbody tr:last-child td { border-bottom: none; }
  .ptable tbody td:not(:first-child) {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 12px;
  }
  .ptable tbody td:first-child {
    color: var(--text-secondary);
    font-size: 12px;
  }
  .ptable tbody tr.row-highlight { background: var(--row-highlight); }
  .ptable tbody tr.row-highlight td { color: var(--text-primary); font-weight: 600; }
  .ptable tbody tr.row-highlight td:first-child {
    color: var(--text-primary);
    font-weight: 700;
  }
  .ptable .col-margin {
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 400;
  }
  .ptable .col-profit { color: var(--text-primary); }
  .ptable .cell-missing {
    color: var(--text-tertiary);
    font-weight: 400;
  }

  /* === ONE-OFF BLOCK === */
  .oneoff-block {
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    border-left: 3px solid var(--text-tertiary);
    border-radius: 8px;
    padding: 20px;
  }
  .oneoff-block .oneoff-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .oneoff-block .oneoff-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .oneoff-block .oneoff-line:last-of-type { border-bottom: none; }
  .oneoff-block .oneoff-k {
    font-size: 12px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .oneoff-block .oneoff-v {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .oneoff-block .oneoff-note {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }

  /* === INFO CARD === */
  .info-card {
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 18px;
  }
  .info-card h4 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
  }
  .info-row + .info-row { border-top: 1px solid var(--border-subtle); }
  .info-row .ir-k {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .info-row .ir-v {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: right;
    max-width: 60%;
    word-break: break-word;
  }
  .ir-v.mono {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  /* === CONNECTIONS LIST === */
  .conn-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .conn-section + .conn-section { margin-top: 18px; }
  .conn-section h5 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    margin-bottom: 8px;
  }
  .conn-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    background: var(--surface-3);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    color: inherit;
  }
  .conn-link:hover {
    background: var(--surface-4);
    border-color: var(--border-strong);
  }
  .conn-link .conn-pn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .conn-link .conn-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: 12px;
    text-align: right;
    flex: 1 1 auto;
  }
  .conn-empty {
    font-size: 12px;
    color: var(--text-tertiary);
    font-style: italic;
    padding: 8px 0;
  }

  /* === NOTES PANEL === */
  .notes-panel {
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 20px 22px;
    margin-bottom: 40px;
  }
  .notes-panel h4 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }
  .notes-panel .prose {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* === COPY BUTTON === */
  .copy-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .copy-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border: 1px solid var(--border-medium);
    background: var(--surface-3);
    color: var(--text-primary);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .copy-btn:hover {
    background: var(--surface-4);
    border-color: var(--border-strong);
  }
  .copy-btn.copied {
    background: var(--surface-4);
    border-color: var(--border-strong);
    color: var(--text-primary);
    pointer-events: none;
  }
  .copy-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .copy-hint.show { opacity: 1; }

  /* === LIGHTBOX === */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 28px;
    cursor: pointer;
    z-index: 1010;
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s, color 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .lightbox-content {
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox-content img, .lightbox-content canvas {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
  }

  /* === PDF MODAL === */
  #pdf-modal { display: none; }
  #pdf-modal.open { display: flex; }
  #pdf-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
  }
  #pdf-modal-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90vw;
    height: 90vh;
    background: #1a1a1a;
    border-radius: 4px;
    z-index: 1001;
  }
  #pdf-modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    color: #fff;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    z-index: 1002;
  }
  #pdf-modal-embed {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <span class="brand">Elliott</span>
      <span class="divider"></span>
      <span class="subtitle">Pro Label Pricing Engine</span>
    </div>
    <div class="topbar-tabs">
      <button class="tab-btn active" id="tabItems" onclick="setTab('items')">Items</button>
      <button class="tab-btn" id="tabMaterials" onclick="setTab('materials')">Materials</button>
    </div>
    <span class="count-chip" id="countChip">—</span>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="filter-wrap" id="filterWrap"></div>
      <div class="item-list" id="sidebarList"></div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">
      <div class="empty" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <p id="emptyText">Select an item from the list</p>
      </div>

      <!-- ITEM DETAIL -->
      <div class="detail" id="itemDetail">
        <div class="sticky-block">
          <div class="sticky-top-row">
            <div class="sticky-info" id="itemStickyInfo"></div>
            <div class="sticky-image" id="itemStickyImage"></div>
          </div>
          <div class="stat-row" id="itemStatRow"></div>
        </div>
        <div class="scroll-area">
          <div class="mid-grid">
            <div class="section">
              <div class="section-title" id="pricingTitle">Volume Pricing</div>
              <div id="pricingBody"></div>
              <div class="copy-wrap">
                <button class="copy-btn" id="copyBtn" onclick="copyForEmail()">Copy for Email</button>
                <span class="copy-hint" id="copyHint">Copied to clipboard</span>
              </div>
            </div>
            <div class="section">
              <div class="section-title">Specifications</div>
              <div class="info-card" id="specsCard"></div>
            </div>
          </div>
          <div id="notesContainer"></div>
        </div>
      </div>

      <!-- MATERIAL DETAIL -->
      <div class="detail" id="materialDetail">
        <div class="sticky-block">
          <div class="sticky-top-row">
            <div class="sticky-info" id="matStickyInfo"></div>
          </div>
          <div class="stat-row" id="matStatRow"></div>
        </div>
        <div class="scroll-area">
          <div class="mid-grid">
            <div class="section">
              <div class="section-title">Specifications</div>
              <div class="info-card" id="matSpecsCard"></div>
            </div>
            <div class="section">
              <div class="section-title">Connections</div>
              <div class="info-card" id="matConnectionsCard"></div>
            </div>
          </div>
          <div id="matNotesContainer"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="pdf-modal">
  <div id="pdf-modal-backdrop"></div>
  <div id="pdf-modal-container">
    <button id="pdf-modal-close">✕</button>
    <embed id="pdf-modal-embed" type="application/pdf" />
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-content" id="lightboxContent"></div>
</div>

<script>
let ITEMS_DATA = null;
let MATERIALS_DATA = null;
let items = {};
let materials = {};
let sortedPNs = [];
let sortedMIDs = [];
let selectedPN = null;
let selectedMID = null;
let activeTab = 'items';
let activeFilter = null;
let pdfCache = {};

const MATERIAL_TYPE_LABEL = {
  cut_vinyl: 'Cut Vinyl',
  print_media: 'Print Media',
  laminate: 'Laminate',
  tape: 'Application Tape',
};

async function init() {
  try {
    const [r1, r2] = await Promise.all([fetch('data.json'), fetch('materials.json')]);
    ITEMS_DATA = await r1.json();
    MATERIALS_DATA = await r2.json();
    items = ITEMS_DATA.items;
    materials = MATERIALS_DATA.materials;
    sortedPNs = Object.keys(items).sort();
    sortedMIDs = Object.keys(materials).sort();
    setTab('items');
  } catch(e) {
    console.error(e);
    document.getElementById('emptyText').textContent = 'Failed to load data — run build_frontend.py and build_materials.py';
  }
}

function setTab(tab) {
  activeTab = tab;
  document.getElementById('tabItems').classList.toggle('active', tab === 'items');
  document.getElementById('tabMaterials').classList.toggle('active', tab === 'materials');
  document.getElementById('search').value = '';
  activeFilter = null;
  document.getElementById('itemDetail').classList.remove('visible');
  document.getElementById('materialDetail').classList.remove('visible');
  document.getElementById('emptyState').style.display = 'flex';

  if (tab === 'items') {
    document.getElementById('emptyText').textContent = 'Select an item from the list';
    document.getElementById('countChip').textContent = ITEMS_DATA.item_count + ' items';
    buildItemFilters();
    renderItemList('');
  } else {
    document.getElementById('emptyText').textContent = 'Select a material from the list';
    document.getElementById('countChip').textContent = MATERIALS_DATA.material_count + ' materials';
    buildMaterialFilters();
    renderMaterialList('');
  }

  bindSearch();
}

function bindSearch() {
  const s = document.getElementById('search');
  s.placeholder = activeTab === 'items' ? 'Search P/N, description…' : 'Search material name, color…';
  s.oninput = e => {
    if (activeTab === 'items') renderItemList(e.target.value);
    else renderMaterialList(e.target.value);
  };
}

/* ===== ITEMS TAB ===== */

function buildItemFilters() {
  const families = new Set();
  sortedPNs.forEach(pn => families.add(items[pn].frontmatter.material_family));
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-pill active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setFilter(null, allBtn);
  wrap.appendChild(allBtn);

  families.forEach(family => {
    const btn = document.createElement('button');
    btn.className = 'filter-pill';
    const short = (family || '')
      .replace('Orajet 3951 Cast + Polyester Lam', 'Printed + Laminated')
      .replace('3M 180mC Cut Vinyl', 'Cut Vinyl');
    btn.textContent = short;
    btn.onclick = () => setFilter(family, btn);
    wrap.appendChild(btn);
  });
}

function setFilter(family, btn) {
  activeFilter = family;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  if (activeTab === 'items') renderItemList(document.getElementById('search').value);
}

function renderItemList(query) {
  const q = query.toLowerCase().trim();
  const el = document.getElementById('sidebarList');
  const matches = sortedPNs.filter(pn => {
    const fm = items[pn].frontmatter;
    if (activeFilter && fm.material_family !== activeFilter) return false;
    return pn.includes(q)
      || (fm.description || '').toLowerCase().includes(q)
      || (fm.model || '').toLowerCase().includes(q)
      || (fm.item_type || '').toLowerCase().includes(q)
      || (fm.material_family || '').toLowerCase().includes(q);
  });

  el.innerHTML = matches.map(pn => {
    const fm = items[pn].frontmatter;
    const sel = pn === selectedPN ? ' selected' : '';
    const price = num(fm.price_20_49);
    return `<div class="list-item${sel}" data-pn="${pn}" onclick="selectItem('${pn}')">
      <div class="li-top">
        <span class="li-pn">${pn}</span>
      </div>
      <div class="li-desc">${escapeHtml(fm.description || '')}</div>
      <div class="li-meta">
        <span>${escapeHtml(fm.model || '')}</span>
        <span>${escapeHtml(fm.item_type || '')}</span>
        <span class="li-price">${price === '—' ? '—' : '$' + price}</span>
      </div>
    </div>`;
  }).join('');
}

function isOneOff(fm) {
  const m = String(fm.margin_at_qty_20 || '');
  const p = String(fm.pricing_logic || '');
  return m.includes('N/A') || p.toUpperCase().includes('ONE-OFF');
}

function selectItem(pn) {
  selectedPN = pn;
  const item = items[pn];
  const fm = item.frontmatter;

  // Make sure we're on items tab
  if (activeTab !== 'items') {
    setTab('items');
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('materialDetail').classList.remove('visible');
  const detail = document.getElementById('itemDetail');
  detail.classList.remove('visible');
  void detail.offsetWidth;
  detail.classList.add('visible');

  renderItemList(document.getElementById('search').value);
  renderItemHeader(fm);
  renderItemImage(item);
  renderItemStats(fm);
  renderPricing(fm);
  renderSpecs(fm);
  renderNotes(fm);

  // Reset scroll
  const scroll = detail.querySelector('.scroll-area');
  if (scroll) scroll.scrollTop = 0;
}

function renderItemHeader(fm) {
  const el = document.getElementById('itemStickyInfo');
  const oneOff = isOneOff(fm);
  const tag = oneOff ? `<span class="dh-tag">One-Off Program</span>` : '';
  el.innerHTML = `
    <span class="dh-pn">${escapeHtml(fm.part_number)}${tag}</span>
    <div class="dh-desc">${escapeHtml(fm.description || '')}</div>
    <div class="dh-crumbs">
      <span>${escapeHtml(fm.model || '')}</span><span class="sep">·</span>
      <span>${escapeHtml(fm.item_type || '')}</span><span class="sep">·</span>
      <span>${escapeHtml(fm.material_family || '')}</span>
    </div>
  `;
}

function renderItemImage(item) {
  const el = document.getElementById('itemStickyImage');
  const files = item.image;
  if (!files || files.length === 0) { el.innerHTML = ''; return; }

  // Use the first file
  const file = files[0];
  if (file.type === 'pdf') {
    el.innerHTML = `<a class="thumb-link" href="#" id="stickyImgLink"></a>`;
    const link = document.getElementById('stickyImgLink');
    link.addEventListener('click', e => {
      e.preventDefault();
      openPdfModal(file.path);
    });
    renderPdfFirstPage(file.path, link);
  } else {
    el.innerHTML = `<a class="thumb-link" href="${file.path}" target="_blank" rel="noopener">
      <img src="${file.path}" alt="${escapeHtml(file.path)}" />
    </a>`;
  }
}

async function renderPdfFirstPage(src, container) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = pdfCache[src] || await pdfjsLib.getDocument(src).promise;
    pdfCache[src] = pdf;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    container.appendChild(canvas);
    const lbl = document.createElement('div');
    lbl.className = 'pdf-label';
    lbl.textContent = src.split('/').pop();
    container.appendChild(lbl);
  } catch(e) {
    container.innerHTML = `<div class="pdf-stack"><div class="pdf-label">${src.split('/').pop()}</div></div>`;
  }
}

function renderItemStats(fm) {
  const el = document.getElementById('itemStatRow');
  const oneOff = isOneOff(fm);

  const p20 = toNum(fm.price_20_49);
  const mc = toNum(fm.material_cost_per_unit);
  const sqft = toNum(fm.sq_ft_per_kit);

  const priceCard = `
    <div class="stat-block">
      <div class="stat-label">Price @ Qty 20</div>
      <div class="stat-value">${p20 != null ? '$' + p20.toFixed(2) : '—'}</div>
      ${(fm.label_count > 1 && toNum(fm.per_label_at_qty_20) != null)
        ? `<div class="stat-sub">$${toNum(fm.per_label_at_qty_20).toFixed(2)} per label</div>` : ''}
    </div>`;

  const mcCard = `
    <div class="stat-block">
      <div class="stat-label">Material Cost</div>
      <div class="stat-value">${mc != null ? '$' + mc.toFixed(2) : '—'}</div>
      ${fm.cost_version_date ? `<div class="stat-sub">as of ${fm.cost_version_date}</div>` : ''}
    </div>`;

  let marginCard;
  if (oneOff) {
    marginCard = `
      <div class="stat-block">
        <div class="stat-label">Margin @ Qty 20</div>
        <div class="stat-value muted">N/A — One-Off</div>
      </div>`;
  } else {
    const marginStr = fm.margin_at_qty_20 ? String(fm.margin_at_qty_20).trim() : '';
    let display;
    if (marginStr) display = marginStr;
    else if (p20 != null && mc != null) display = ((p20 - mc) / p20 * 100).toFixed(0) + '%';
    else display = '—';
    marginCard = `
      <div class="stat-block">
        <div class="stat-label">Margin @ Qty 20</div>
        <div class="stat-value">${display}</div>
      </div>`;
  }

  let ppsfCard = '';
  if (!oneOff) {
    if (p20 != null && sqft != null && sqft > 0) {
      const ppsf = (p20 / sqft).toFixed(2);
      ppsfCard = `
        <div class="stat-block">
          <div class="stat-label">$/Sq Ft @ Qty 20</div>
          <div class="stat-value">$${ppsf}</div>
          <div class="stat-sub">${sqft.toFixed(3)} sq ft</div>
        </div>`;
    } else {
      ppsfCard = `
        <div class="stat-block">
          <div class="stat-label">$/Sq Ft @ Qty 20</div>
          <div class="stat-value">—</div>
        </div>`;
    }
  }

  el.style.gridTemplateColumns = oneOff ? 'repeat(3, 1fr)' : 'repeat(4, 1fr)';
  el.innerHTML = priceCard + mcCard + marginCard + ppsfCard;
}

function renderPricing(fm) {
  const title = document.getElementById('pricingTitle');
  const body = document.getElementById('pricingBody');
  const oneOff = isOneOff(fm);

  if (oneOff) {
    title.textContent = 'Program Pricing';
    const perLabel = toNum(fm.price_1_9);
    body.innerHTML = `
      <div class="oneoff-block">
        <div class="oneoff-tag">One-Time Program Only</div>
        <div class="oneoff-line">
          <span class="oneoff-k">Per-Label Rate</span>
          <span class="oneoff-v">${perLabel != null ? '$' + perLabel.toFixed(2) : '—'}</span>
        </div>
        <div class="oneoff-note">
          Program Note: See pricing derivation for full program context.
          Not a catalog rate — do not use as a benchmark for future items.
        </div>
      </div>
    `;
    return;
  }

  title.textContent = 'Volume Pricing';
  const mc = toNum(fm.material_cost_per_unit);
  const isKit = fm.label_count > 1;

  const tiers = [
    { label: '1–9',     price: toNum(fm.price_1_9) },
    { label: '10–19',   price: toNum(fm.price_10_19) },
    { label: '20–49',   price: toNum(fm.price_20_49), highlight: true },
    { label: '50–99',   price: toNum(fm.price_50_99) },
    { label: '100–199', price: toNum(fm.price_100_199) },
    { label: '200+',    price: toNum(fm.price_200_plus) },
  ].filter(t => t.price != null);

  const fa = toNum(fm.first_article_price);

  let html = `<table class="ptable"><thead><tr>
    <th>Quantity</th><th>Unit Price</th>
    ${isKit ? '<th>Per Label</th>' : ''}
    <th>Gross Profit</th><th>Margin</th>
  </tr></thead><tbody>`;

  if (fa != null) {
    const profit = mc != null ? (fa - mc) : null;
    const margin = (mc != null && fa > 0) ? ((fa - mc) / fa * 100).toFixed(0) + '%' : '—';
    html += `<tr>
      <td>First Article</td>
      <td>$${fa.toFixed(2)}</td>
      ${isKit ? `<td>$${(fa / fm.label_count).toFixed(2)}</td>` : ''}
      <td class="${profit != null ? 'col-profit' : 'cell-missing'}">${profit != null ? '$' + profit.toFixed(2) : '—'}</td>
      <td class="col-margin">${margin}</td>
    </tr>`;
  }

  tiers.forEach(t => {
    const p = t.price;
    const perLabel = isKit ? p / fm.label_count : null;
    const profit = mc != null ? (p - mc) : null;
    const margin = (mc != null && p > 0) ? ((p - mc) / p * 100).toFixed(0) + '%' : '—';
    const cls = t.highlight ? 'row-highlight' : '';
    html += `<tr class="${cls}">
      <td>${t.label}</td>
      <td>$${p.toFixed(2)}</td>
      ${isKit ? `<td>$${perLabel.toFixed(2)}</td>` : ''}
      <td class="${profit != null ? 'col-profit' : 'cell-missing'}">${profit != null ? '$' + profit.toFixed(2) : '—'}</td>
      <td class="col-margin">${margin}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  body.innerHTML = html;
}

function renderSpecs(fm) {
  const el = document.getElementById('specsCard');
  const w = toNum(fm.width_in);
  const h = toNum(fm.height_in);
  const sfl = toNum(fm.sq_ft_per_label);
  const sfk = toNum(fm.sq_ft_per_kit);
  const dim = (w != null && h != null) ? `${w}" × ${h}"` : '—';

  let html = '';
  html += row('Dimensions', dim);
  html += row('Sq Ft / Label', sfl != null ? sfl.toFixed(3) : '—');
  if (fm.label_count > 1 && sfk != null) {
    html += row('Sq Ft / Kit', sfk.toFixed(3));
    html += row('Labels / Kit', fm.label_count);
  }
  html += row('Material Family', fm.material_family || '—');
  html += row('Process', fm.process || '—');
  html += row('Lam Passes', fm.lamination_passes != null && fm.lamination_passes !== '' ? fm.lamination_passes : '—');
  html += row('Cut Runs', fm.cut_runs != null && fm.cut_runs !== '' ? fm.cut_runs : '—');
  html += row('Status', fm.status || '—');
  html += row('Date Quoted', fm.date_quoted || '—');

  el.innerHTML = html;
}

function renderNotes(fm) {
  const el = document.getElementById('notesContainer');
  const notes = (fm.notes || '').trim();
  if (!notes) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="notes-panel">
      <h4>Notes</h4>
      <div class="prose">${escapeHtml(notes)}</div>
    </div>
  `;
}

/* ===== MATERIALS TAB ===== */

function buildMaterialFilters() {
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-pill active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setMaterialFilter(null, allBtn);
  wrap.appendChild(allBtn);

  const types = new Set();
  sortedMIDs.forEach(mid => types.add(materials[mid].frontmatter.material_type));

  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-pill';
    btn.textContent = MATERIAL_TYPE_LABEL[t] || t;
    btn.onclick = () => setMaterialFilter(t, btn);
    wrap.appendChild(btn);
  });
}

function setMaterialFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderMaterialList(document.getElementById('search').value);
}

function renderMaterialList(query) {
  const q = query.toLowerCase().trim();
  const el = document.getElementById('sidebarList');

  const matches = sortedMIDs.filter(mid => {
    const fm = materials[mid].frontmatter;
    if (activeFilter && fm.material_type !== activeFilter) return false;
    const hay = [
      mid, fm.product_name, fm.product_code, fm.color_name, fm.manufacturer, fm.material_type
    ].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });

  // Group by material_type
  const groups = {};
  matches.forEach(mid => {
    const t = materials[mid].frontmatter.material_type;
    if (!groups[t]) groups[t] = [];
    groups[t].push(mid);
  });

  const order = ['cut_vinyl', 'print_media', 'laminate', 'tape'];
  let html = '';
  order.forEach(t => {
    if (!groups[t]) return;
    html += `<div class="group-header">${MATERIAL_TYPE_LABEL[t]}</div>`;
    groups[t].sort((a, b) => {
      const fa = materials[a].frontmatter;
      const fb = materials[b].frontmatter;
      const na = (fa.product_name || '') + ' ' + (fa.color_name || '') + ' ' + (fa.roll_width_in || '');
      const nb = (fb.product_name || '') + ' ' + (fb.color_name || '') + ' ' + (fb.roll_width_in || '');
      return na.localeCompare(nb);
    });
    groups[t].forEach(mid => {
      const fm = materials[mid].frontmatter;
      const sel = mid === selectedMID ? ' selected' : '';
      const name = materialDisplayName(fm);
      const cost = fm.cost_per_sq_ft != null ? '$' + Number(fm.cost_per_sq_ft).toFixed(2) + '/sq ft' : '—';
      html += `<div class="list-item${sel}" onclick="selectMaterial('${mid}')">
        <div class="li-top">
          <span class="li-pn">${escapeHtml(name)}</span>
        </div>
        <div class="li-desc">${escapeHtml((fm.manufacturer || '') + (fm.product_code ? ' · ' + fm.product_code : ''))}</div>
        <div class="li-meta">
          <span class="li-type-chip">${MATERIAL_TYPE_LABEL[fm.material_type] || fm.material_type}</span>
          <span class="li-price">${cost}</span>
        </div>
      </div>`;
    });
  });

  el.innerHTML = html || '<div class="conn-empty" style="padding:16px;">No materials match.</div>';
}

function materialDisplayName(fm) {
  if (fm.material_type === 'cut_vinyl') {
    const rw = fm.roll_width_in ? `${fm.roll_width_in}"` : '';
    return `${fm.product_name} ${fm.color_name}${rw ? ' (' + rw + ')' : ''}`;
  }
  return fm.product_name || fm.material_id;
}

function selectMaterial(mid) {
  selectedMID = mid;
  const mat = materials[mid];
  const fm = mat.frontmatter;

  if (activeTab !== 'materials') {
    setTab('materials');
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('itemDetail').classList.remove('visible');
  const detail = document.getElementById('materialDetail');
  detail.classList.remove('visible');
  void detail.offsetWidth;
  detail.classList.add('visible');

  renderMaterialList(document.getElementById('search').value);
  renderMaterialHeader(fm);
  renderMaterialStats(fm);
  renderMaterialSpecs(fm);
  renderMaterialConnections(fm);
  renderMaterialNotes(fm);

  const scroll = detail.querySelector('.scroll-area');
  if (scroll) scroll.scrollTop = 0;
}

function renderMaterialHeader(fm) {
  const el = document.getElementById('matStickyInfo');
  const name = materialDisplayName(fm);
  const sub = [fm.manufacturer, fm.product_code].filter(Boolean).join(' · ');
  el.innerHTML = `
    <span class="dh-pn" style="font-size:24px;">${escapeHtml(name)}</span>
    <div class="dh-desc">${escapeHtml(sub)}</div>
    <div class="dh-crumbs">
      <span>${MATERIAL_TYPE_LABEL[fm.material_type] || fm.material_type}</span>
    </div>
  `;
}

function renderMaterialStats(fm) {
  const el = document.getElementById('matStatRow');
  const cards = [];

  cards.push(`<div class="stat-block">
    <div class="stat-label">Cost / Sq Ft</div>
    <div class="stat-value">${fm.cost_per_sq_ft != null ? '$' + Number(fm.cost_per_sq_ft).toFixed(2) : '—'}</div>
  </div>`);

  cards.push(`<div class="stat-block">
    <div class="stat-label">Roll Width</div>
    <div class="stat-value">${fm.roll_width_in != null ? fm.roll_width_in + '"' : '—'}</div>
  </div>`);

  const thick = fm.film_thickness_mil != null ? fm.film_thickness_mil : fm.thickness_mil;
  cards.push(`<div class="stat-block">
    <div class="stat-label">Thickness</div>
    <div class="stat-value">${thick != null ? thick + ' mil' : '—'}</div>
  </div>`);

  cards.push(`<div class="stat-block">
    <div class="stat-label">Verified</div>
    <div class="stat-value" style="font-size:14px;">${fm.verified_date || '—'}</div>
  </div>`);

  el.style.gridTemplateColumns = 'repeat(4, 1fr)';
  el.innerHTML = cards.join('');
}

function renderMaterialSpecs(fm) {
  const el = document.getElementById('matSpecsCard');
  const t = fm.material_type;
  const rows = [];

  const add = (k, v) => { if (v !== undefined && v !== null && v !== '') rows.push(row(k, v)); };
  const fmt$ = v => v != null && v !== '' ? '$' + Number(v).toFixed(2) : '';
  const fmtIn = v => v != null && v !== '' ? v + '"' : '';
  const fmtYd = v => v != null && v !== '' ? v + ' yd' : '';
  const fmtMil = v => v != null && v !== '' ? v + ' mil' : '';

  if (t === 'cut_vinyl') {
    add('Color Name', fm.color_name);
    add('Color Code', fm.color_code);
    add('Film Type', fm.film_type);
    add('Film Thickness', fmtMil(fm.film_thickness_mil));
    add('Adhesive Type', fm.adhesive_type);
    add('Roll Width', fmtIn(fm.roll_width_in));
    add('Roll Length', fmtYd(fm.roll_length_yd));
    add('Cost / Roll', fmt$(fm.cost_per_roll));
    add('Cost / Linear Yd', fmt$(fm.cost_per_linear_yd));
    add('Cost / Sq Ft', fmt$(fm.cost_per_sq_ft));
    add('Distributor', fm.distributor);
  } else if (t === 'print_media') {
    add('Film Type', fm.film_type);
    add('Film Thickness', fmtMil(fm.film_thickness_mil));
    add('Adhesive Type', fm.adhesive_type);
    add('Roll Width', fmtIn(fm.roll_width_in));
    add('Cost / Sq Ft', fmt$(fm.cost_per_sq_ft));
    add('Distributor', fm.distributor);
  } else if (t === 'laminate') {
    add('Film Type', fm.film_type);
    add('Thickness', fmtMil(fm.thickness_mil));
    add('Finish', fm.finish);
    add('Roll Width', fmtIn(fm.roll_width_in));
    add('Cost / Sq Ft', fmt$(fm.cost_per_sq_ft));
    add('Cost / MSI', fm.cost_per_msi != null && fm.cost_per_msi !== '' ? '$' + Number(fm.cost_per_msi).toFixed(2) : '');
    add('Max Laminator Width', fmtIn(fm.max_laminator_width_in));
    add('Distributor', fm.distributor);
  } else if (t === 'tape') {
    add('Film Type', fm.film_type);
    add('Roll Width', fmtIn(fm.roll_width_in));
    add('Roll Length', fmtYd(fm.roll_length_yd));
    add('Cost / Roll', fmt$(fm.cost_per_roll));
    add('Cost / Sq Ft', fmt$(fm.cost_per_sq_ft));
    add('Distributor', fm.distributor);
  }

  add('Verified Date', fm.verified_date);

  el.innerHTML = rows.join('') || '<div class="conn-empty">No specifications recorded.</div>';
}

function renderMaterialConnections(fm) {
  const el = document.getElementById('matConnectionsCard');
  let html = '';

  // Items
  const used = fm.used_in_items || [];
  html += '<div class="conn-section"><h5>Items Using This Material</h5>';
  if (used.length === 0) {
    html += '<div class="conn-empty">No items recorded.</div>';
  } else {
    html += '<div class="conn-list">';
    used.forEach(pn => {
      const item = items[pn];
      const desc = item ? escapeHtml(item.frontmatter.description || '') : '';
      html += `<a class="conn-link" onclick="selectItem('${pn}')">
        <span class="conn-pn">${escapeHtml(pn)}</span>
        <span class="conn-desc">${desc}</span>
      </a>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // Related materials
  let related = [];
  let relatedLabel = '';
  if (fm.material_type === 'cut_vinyl') {
    related = fm.compatible_tapes || [];
    relatedLabel = 'Used With (Application Tape)';
  } else if (fm.material_type === 'print_media') {
    related = fm.compatible_laminates || [];
    relatedLabel = 'Used With (Laminate)';
  } else if (fm.material_type === 'laminate') {
    related = fm.compatible_substrates || [];
    relatedLabel = 'Used With (Substrate)';
  } else if (fm.material_type === 'tape') {
    related = fm.compatible_cut_vinyls || [];
    relatedLabel = 'Used With (Cut Vinyl)';
  }

  html += `<div class="conn-section"><h5>${relatedLabel}</h5>`;
  if (related.length === 0) {
    html += '<div class="conn-empty">None recorded.</div>';
  } else {
    html += '<div class="conn-list">';
    related.forEach(rid => {
      const r = materials[rid];
      const name = r ? escapeHtml(materialDisplayName(r.frontmatter)) : escapeHtml(rid);
      const sub = r ? escapeHtml([r.frontmatter.manufacturer, r.frontmatter.product_code].filter(Boolean).join(' · ')) : '';
      html += `<a class="conn-link" onclick="selectMaterial('${rid}')">
        <span class="conn-pn" style="font-family:'Outfit',sans-serif;font-size:13px;">${name}</span>
        <span class="conn-desc">${sub}</span>
      </a>`;
    });
    html += '</div>';
  }
  html += '</div>';

  el.innerHTML = html;
}

function renderMaterialNotes(fm) {
  const el = document.getElementById('matNotesContainer');
  const notes = (fm.notes || '').trim();
  if (!notes) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="notes-panel">
      <h4>Notes</h4>
      <div class="prose">${escapeHtml(notes)}</div>
    </div>
  `;
}

/* ===== UTILITIES ===== */

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function row(k, v) {
  return `<div class="info-row"><span class="ir-k">${k}</span><span class="ir-v">${v}</span></div>`;
}

function toNum(n) {
  if (n === null || n === undefined || n === '') return null;
  const v = typeof n === 'string' ? parseFloat(n) : n;
  return isNaN(v) ? null : v;
}

function num(n) {
  const v = toNum(n);
  return v == null ? '—' : v.toFixed(2);
}

function copyForEmail() {
  if (!selectedPN) return;
  const fm = items[selectedPN].frontmatter;
  const oneOff = isOneOff(fm);
  const isKit = fm.label_count > 1;

  let lines = [`P/N ${fm.part_number} — ${fm.description}`];
  if (isKit) lines.push(`Kit of ${fm.label_count} labels`);
  lines.push(fm.material_family);
  lines.push('');

  if (oneOff) {
    const perLabel = toNum(fm.price_1_9);
    lines.push(`One-Time Program — $${perLabel != null ? perLabel.toFixed(2) : '—'} per label`);
    lines.push(`Not a catalog rate. Quoted for this program only.`);
  } else {
    const unit = isKit ? 'per kit' : 'ea';
    const tiers = [
      { label: 'First Article', price: toNum(fm.first_article_price) },
      { label: '1-9',     price: toNum(fm.price_1_9) },
      { label: '10-19',   price: toNum(fm.price_10_19) },
      { label: '20-49',   price: toNum(fm.price_20_49) },
      { label: '50-99',   price: toNum(fm.price_50_99) },
      { label: '100-199', price: toNum(fm.price_100_199) },
      { label: '200+',    price: toNum(fm.price_200_plus) },
    ].filter(t => t.price != null);

    tiers.forEach(t => {
      const padLabel = t.label.padEnd(14);
      lines.push(`${padLabel}$${t.price.toFixed(2)} ${unit}`);
    });
  }

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copyBtn');
    const hint = document.getElementById('copyHint');
    btn.classList.add('copied');
    btn.textContent = 'Copied';
    hint.classList.add('show');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'Copy for Email';
      hint.classList.remove('show');
    }, 2000);
  });
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('lightboxContent').innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
});

function openPdfModal(path) {
  const modal = document.getElementById('pdf-modal');
  const embed = document.getElementById('pdf-modal-embed');
  embed.setAttribute('src', path + '#zoom=page-fit');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePdfModal() {
  const modal = document.getElementById('pdf-modal');
  const embed = document.getElementById('pdf-modal-embed');
  modal.classList.remove('open');
  embed.removeAttribute('src');
  document.body.style.overflow = '';
}

document.getElementById('pdf-modal-backdrop').addEventListener('click', closePdfModal);
document.getElementById('pdf-modal-close').addEventListener('click', closePdfModal);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('pdf-modal').classList.contains('open')) {
    closePdfModal();
  }
});

init();
</script>
