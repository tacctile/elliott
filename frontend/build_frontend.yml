name: Build Frontend Data

on:
  push:
    branches: [main]
    paths:
      - 'items/**'
      - 'scripts/build_frontend.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build data.json and sync images
        run: python scripts/build_frontend.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data.json frontend/images/
          git diff --cached --quiet || git commit -m "system: auto-rebuild frontend data + sync images"
          git push
